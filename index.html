<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Simulation — Mô phỏng vật lý 3D</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" aria-label="Bảng điều khiển">
        <header class="app-header">
          <div class="app-brand">
            <span class="app-logo" aria-hidden="true">⚛</span>
            <div>
              <h1>Physics Sim</h1>
              <p class="subtitle">Mô phỏng vật lý 3D · THCS</p>
            </div>
          </div>
        </header>

        <section class="sidebar-block sidebar-transport" aria-label="Điều khiển mô phỏng">
          <div id="playback-bar" class="playback-bar" role="toolbar" aria-label="Playback">
            <button type="button" id="btn-play" class="btn btn-play primary" title="Play (Space)">
              <span class="btn-icon" aria-hidden="true">▶</span>
              <span class="btn-label">Play</span>
            </button>
            <button type="button" id="btn-pause" class="btn btn-pause" title="Pause (Space)">
              <span class="btn-icon" aria-hidden="true">⏸</span>
              <span class="btn-label">Pause</span>
            </button>
            <button type="button" id="btn-reset" class="btn btn-reset" title="Reset">
              <span class="btn-icon" aria-hidden="true">↺</span>
              <span class="btn-label">Reset</span>
            </button>
            <button type="button" id="btn-reset-view" class="btn btn-view" title="Reset camera">
              <span class="btn-icon" aria-hidden="true">⌂</span>
              <span class="btn-label">View</span>
            </button>
          </div>
          <p id="drag-hint" class="hint status-hint">STOPPED/PAUSED: click trái để chọn vật, kéo trái để xoay camera.</p>
        </section>

        <section class="sidebar-block sidebar-controls" aria-label="Tham số">
          <div id="gui-root"></div>
        </section>

        <section id="data-panel" class="sidebar-block data-panel" aria-label="Dữ liệu vật lý">
          <div class="panel-head">
            <h2>Dữ liệu vật lý</h2>
            <span class="panel-badge" id="data-scene-badge">—</span>
          </div>
          <div id="data-content" class="data-scroll" role="log" aria-live="polite">
            <p class="data-placeholder">Chọn scene và bấm Play để xem số liệu thời gian thực.</p>
          </div>
          <div class="data-actions" role="group" aria-label="Ghi dữ liệu">
            <button type="button" id="btn-record" class="btn small">
              <span aria-hidden="true">＋</span> Ghi mốc
            </button>
            <button type="button" id="btn-clear-records" class="btn small">Xóa mốc</button>
            <button type="button" id="btn-export-csv" class="btn small accent-outline">Export CSV</button>
          </div>
          <div id="records-table-wrap" class="records-wrap hidden">
            <table id="records-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>t (s)</th>
                  <th>Pos</th>
                  <th>v (m/s)</th>
                  <th>Ek (J)</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </aside>

      <main id="viewport" aria-label="Khung nhìn 3D">
        <canvas id="canvas"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
